name: Create Docker Release

on:
  workflow_call:
    inputs:
      docker_tag:
        description: 'Docker tag' # latest | beta
        required: true
        type: string
      version_tag:
        description: 'Version tag' # 0.1.2-beta.2
        required: true
        type: string
      branch:
        description: 'Branch to checkout'
        required: true
        type: string

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
        - platform: linux/arm64
          runner: ubuntu-24.04-arm

    steps:
    - name: Checkout Repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        ref: ${{ inputs.branch }}
        fetch-depth: 0
        submodules: false
        persist-credentials: false

    - name: Login to Docker Hub
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

    - name: Push to Docker Hub
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
      with:
        context: .
        platforms: ${{ matrix.platform }}
        cache-from: type=gha,scope=${{ matrix.platform }}
        cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
        push: true
        outputs: type=image,name=aminnausin/mediaserver,push-by-digest=true,name-canonical=true
        build-args: |
          GIT_COMMIT=${{ github.sha }}
          GIT_TAG=${{ inputs.version_tag }}

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    name: Merge and Push Manifest
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
    - name: Download digests
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Login to Docker Hub
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

    - name: Create and push manifest
      env:
        DOCKER_TAG: ${{ inputs.docker_tag }}
        VERSION_TAG: ${{ inputs.version_tag }}
      run: |
        docker buildx imagetools create \
          -t aminnausin/mediaserver:${DOCKER_TAG} \
          -t aminnausin/mediaserver:${VERSION_TAG} \
          $(printf 'aminnausin/mediaserver@sha256:%s ' *)
      working-directory: /tmp/digests
